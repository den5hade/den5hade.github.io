name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute Astro base path
        id: astro-base
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "ASTRO_BASE=/" >> "$GITHUB_OUTPUT"
            echo "ASTRO_SITE=https://${OWNER}.github.io/" >> "$GITHUB_OUTPUT"
          else
            echo "ASTRO_BASE=/${REPO}/" >> "$GITHUB_OUTPUT"
            echo "ASTRO_SITE=https://${OWNER}.github.io/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          ASTRO_BASE: ${{ steps.astro-base.outputs.ASTRO_BASE }}
          ASTRO_SITE: ${{ steps.astro-base.outputs.ASTRO_SITE }}
        run: npm run build

      - name: Deploy dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          force_orphan: true

