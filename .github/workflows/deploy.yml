name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Required for GitHub Actions Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; skip queued runs but don't cancel in-progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages (resolves base path automatically)
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          ASTRO_BASE: ${{ steps.pages.outputs.base_path }}
          ASTRO_SITE: ${{ steps.pages.outputs.origin }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

